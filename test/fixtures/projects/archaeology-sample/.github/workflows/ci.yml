name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: pnpm install
      - name: lint
        run: pnpm lint
      - name: test
        run: pnpm test
      - name: typecheck
        run: pnpm typecheck
